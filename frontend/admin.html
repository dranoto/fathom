<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Fathom - Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/forms.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .admin-header h1 {
            margin: 0;
            font-size: 2em;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 24px;
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #d5dbdb;
        }
        .tab-btn.active {
            background-color: #1abc9c;
            color: white;
            border-color: #1abc9c;
        }
        .stat-cards {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #ffffff;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-width: 150px;
        }
        .stat-card h4 {
            margin: 0 0 8px 0;
            color: #7f8c8d;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th {
            background: #34495e;
            color: #ecf0f1;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f8f9f9;
        }
        .inline-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-form .form-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 200px;
        }
        .add-feed-section {
            margin-bottom: 30px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .settings-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .settings-section h3 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #1abc9c;
        }
        .model-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .model-row input {
            flex: 1;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header>
            <div class="container">
                <h1>Fathom</h1>
                <p class="tagline">Admin Panel</p>
            </div>
        </header>

        <nav class="main-nav container">
            <div class="nav-left">
                <a href="/" class="nav-button">News Feed</a>
                <a href="/setup" class="nav-button">Setup</a>
                <span class="nav-button active">Admin</span>
            </div>
            <div class="nav-right">
                <span id="navUser" style="color: #ecf0f1; margin-right: 10px;"></span>
                <button class="nav-button" onclick="logout()">Logout</button>
            </div>
        </nav>

        <main class="container">
            <div id="alertContainer"></div>

            <div class="content-section active">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showTab('users')">Users</button>
                    <button class="tab-btn" onclick="showTab('feeds')">Feeds</button>
                    <button class="tab-btn" onclick="showTab('settings')">Settings</button>
                </div>

                <div id="usersTab" class="tab-content">
                    <div id="usersList">
                        <div class="loading">Loading users...</div>
                    </div>
                </div>

                <div id="feedsTab" class="tab-content">
                    <div class="stat-cards">
                        <div class="stat-card">
                            <h4>Total Feeds</h4>
                            <div class="value" id="totalFeeds">0</div>
                        </div>
                        <div class="stat-card">
                            <h4>Total Articles</h4>
                            <div class="value" id="totalArticles">0</div>
                        </div>
                    </div>

                    <div class="add-feed-section content-section">
                        <h3 style="margin-top: 0;">Add New Feed</h3>
                        <form id="addFeedForm" onsubmit="addFeed(event)">
                            <div class="inline-form">
                                <div class="form-group">
                                    <label for="feedUrl">Feed URL *</label>
                                    <input type="url" id="feedUrl" required placeholder="https://example.com/feed.xml">
                                </div>
                                <div class="form-group">
                                    <label for="feedName">Name (optional)</label>
                                    <input type="text" id="feedName" placeholder="My Feed">
                                </div>
                                <div class="form-group">
                                    <label for="feedInterval">Interval (minutes)</label>
                                    <input type="number" id="feedInterval" value="60" min="5">
                                </div>
                                <div class="form-group" style="align-self: flex-end;">
                                    <button type="submit" class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;">Add Feed</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div id="feedsList">
                        <div class="loading">Loading feeds...</div>
                    </div>
                </div>

                <div id="settingsTab" class="tab-content">
                    <div id="settingsForm">
                        <div class="loading">Loading settings...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="editFeedModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeEditModal()">&times;</span>
            <h3>Edit Feed</h3>
            <form id="editFeedForm" onsubmit="saveEditedFeed(event)">
                <input type="hidden" id="editFeedId">
                <div class="form-group">
                    <label for="editFeedName">Name</label>
                    <input type="text" id="editFeedName" required>
                </div>
                <div class="form-group">
                    <label for="editFeedUrl">URL</label>
                    <input type="url" id="editFeedUrl" readonly style="background: #ecf0f1;">
                </div>
                <div class="form-group">
                    <label for="editFeedInterval">Fetch Interval (minutes)</label>
                    <input type="number" id="editFeedInterval" min="5" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="nav-button" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import * as apiService from '/static/js/apiService.js';
        
        window.logout = function() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_data');
            window.location.href = '/';
        };

        window.showTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + 'Tab').style.display = 'block';
            event.target.classList.add('active');
            
            if (tabName === 'settings') {
                loadSettings();
            } else if (tabName === 'users') {
                loadUsers();
            } else if (tabName === 'feeds') {
                loadFeeds();
            }
        };

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}" style="padding: 15px; border-radius: 5px; margin-bottom: 15px; background: ${type === 'success' ? '#d4edda' : '#f8d7da'}; color: ${type === 'success' ? '#155724' : '#721c24'}; border: 1px solid ${type === 'success' ? '#c3e6cb' : '#f5c6cb'};">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        async function loadUsers() {
            try {
                const users = await apiService.getAdminUsers();
                const container = document.getElementById('usersList');
                
                if (users.length === 0) {
                    container.innerHTML = '<p style="padding: 20px;">No users found.</p>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Admin</th>
                                <th>Created</th>
                                <th>Feeds</th>
                                <th>Article States</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.email}</td>
                                    <td>${u.is_admin ? 'Yes' : 'No'}</td>
                                    <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : 'N/A'}</td>
                                    <td>${u.feed_count}</td>
                                    <td>${u.article_state_count}</td>
                                    <td>
                                        ${u.is_admin ? '<em>Cannot delete</em>' : 
                                            `<button class="nav-button" style="padding: 6px 12px; background: #e74c3c; border-color: #e74c3c; color: white;" onclick="deleteUser(${u.id}, '${u.email.replace(/'/g, "\\'")}')">Delete</button>`}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('usersList').innerHTML = 
                    `<p style="color: #e74c3c; padding: 20px;">Error loading users: ${error.message}</p>`;
            }
        }

        window.deleteUser = async function(userId, email) {
            if (!confirm(`Delete user "${email}"? This will delete all their data.`)) {
                return;
            }
            try {
                await apiService.deleteAdminUser(userId);
                showAlert(`User ${email} deleted`);
                loadUsers();
            } catch (error) {
                showAlert('Error deleting user: ' + error.message, 'error');
            }
        };

        async function loadFeeds() {
            try {
                const feeds = await apiService.getAdminFeeds();
                document.getElementById('totalFeeds').textContent = feeds.length;
                document.getElementById('totalArticles').textContent = 
                    feeds.reduce((sum, f) => sum + f.article_count, 0);
                
                const container = document.getElementById('feedsList');
                
                if (feeds.length === 0) {
                    container.innerHTML = '<p style="padding: 20px;">No feeds found.</p>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>URL</th>
                                <th>Users</th>
                                <th>Articles</th>
                                <th>Interval</th>
                                <th>Last Fetch</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${feeds.map(f => `
                                <tr>
                                    <td>${f.name}</td>
                                    <td><code style="font-size: 0.85em;">${f.url}</code></td>
                                    <td>${f.user_count}</td>
                                    <td>${f.article_count}</td>
                                    <td>${f.fetch_interval_minutes}m</td>
                                    <td>${f.last_fetch_at ? new Date(f.last_fetch_at).toLocaleString() : 'Never'}</td>
                                    <td>
                                        <button class="nav-button" style="padding: 6px 12px;" onclick="openEditModal(${f.id}, '${f.name.replace(/'/g, "\\'")}', '${f.url}', ${f.fetch_interval_minutes})">Edit</button>
                                        ${f.user_count > 0 ? 
                                            `<em style="color: #7f8c8d;">Has users</em>` : 
                                            `<button class="nav-button" style="padding: 6px 12px; background: #e74c3c; border-color: #e74c3c; color: white;" onclick="deleteFeed(${f.id}, '${f.name.replace(/'/g, "\\'")}')">Delete</button>`}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('feedsList').innerHTML = 
                    `<p style="color: #e74c3c; padding: 20px;">Error loading feeds: ${error.message}</p>`;
            }
        }

        window.addFeed = async function(event) {
            event.preventDefault();
            const url = document.getElementById('feedUrl').value;
            const name = document.getElementById('feedName').value || null;
            const interval = parseInt(document.getElementById('feedInterval').value) || 60;
            
            try {
                await apiService.addAdminFeed({ url, name, fetch_interval_minutes: interval });
                showAlert('Feed added successfully');
                document.getElementById('addFeedForm').reset();
                document.getElementById('feedInterval').value = 60;
                loadFeeds();
            } catch (error) {
                showAlert('Error adding feed: ' + error.message, 'error');
            }
        };

        window.deleteFeed = async function(feedId, feedName) {
            if (!confirm(`Delete feed "${feedName}"? All articles will be deleted.`)) {
                return;
            }
            try {
                await apiService.deleteAdminFeed(feedId);
                showAlert(`Feed ${feedName} deleted`);
                loadFeeds();
            } catch (error) {
                showAlert('Error deleting feed: ' + error.message, 'error');
            }
        };

        window.openEditModal = function(feedId, name, url, interval) {
            document.getElementById('editFeedId').value = feedId;
            document.getElementById('editFeedName').value = name;
            document.getElementById('editFeedUrl').value = url;
            document.getElementById('editFeedInterval').value = interval;
            document.getElementById('editFeedModal').style.display = 'flex';
        };

        window.closeEditModal = function() {
            document.getElementById('editFeedModal').style.display = 'none';
        };

        window.saveEditedFeed = async function(event) {
            event.preventDefault();
            const feedId = document.getElementById('editFeedId').value;
            const name = document.getElementById('editFeedName').value;
            const interval = parseInt(document.getElementById('editFeedInterval').value);
            
            try {
                await apiService.updateAdminFeed(feedId, { name, fetch_interval_minutes: interval });
                showAlert('Feed updated successfully');
                closeEditModal();
                loadFeeds();
            } catch (error) {
                showAlert('Error updating feed: ' + error.message, 'error');
            }
        };

        async function loadSettings() {
            try {
                const settings = await apiService.getAdminSettings();
                const container = document.getElementById('settingsForm');
                
                container.innerHTML = `
                    <div class="settings-grid">
                        <div class="settings-section">
                            <h3>Models</h3>
                            <div class="model-row">
                                <label style="width: 120px;">Summary:</label>
                                <input type="text" id="summaryModel" value="${settings.summary_model || ''}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('summary_model', document.getElementById('summaryModel').value)">Update</button>
                            </div>
                            <div class="model-row">
                                <label style="width: 120px;">Chat:</label>
                                <input type="text" id="chatModel" value="${settings.chat_model || ''}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('chat_model', document.getElementById('chatModel').value)">Update</button>
                            </div>
                            <div class="model-row">
                                <label style="width: 120px;">Tag:</label>
                                <input type="text" id="tagModel" value="${settings.tag_model || ''}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('tag_model', document.getElementById('tagModel').value)">Update</button>
                            </div>
                        </div>
                        <div class="settings-section">
                            <h3>Max Output Tokens</h3>
                            <div class="model-row">
                                <label style="width: 120px;">Summary:</label>
                                <input type="number" id="summaryMaxTokens" value="${settings.summary_max_output_tokens || '1024'}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('summary_max_output_tokens', document.getElementById('summaryMaxTokens').value)">Update</button>
                            </div>
                            <div class="model-row">
                                <label style="width: 120px;">Chat:</label>
                                <input type="number" id="chatMaxTokens" value="${settings.chat_max_output_tokens || '4096'}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('chat_max_output_tokens', document.getElementById('chatMaxTokens').value)">Update</button>
                            </div>
                            <div class="model-row">
                                <label style="width: 120px;">Tag:</label>
                                <input type="number" id="tagMaxTokens" value="${settings.tag_max_output_tokens || '100'}">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('tag_max_output_tokens', document.getElementById('tagMaxTokens').value)">Update</button>
                            </div>
                        </div>
                        <div class="settings-section">
                            <h3>System Settings</h3>
                            <div class="model-row">
                                <label style="width: 180px;">Min Word Count:</label>
                                <input type="number" id="minimumWordCount" value="${settings.minimum_word_count || '100'}" min="0" max="1000" style="width: 80px;">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('minimum_word_count', document.getElementById('minimumWordCount').value)">Update</button>
                            </div>
                            <p style="font-size: 0.85em; color: #7f8c8d; margin-top: 5px;">Articles with fewer words will be hidden from feeds.</p>
                            <div class="model-row" style="margin-top: 15px;">
                                <label style="width: 180px;">RSS Interval (min):</label>
                                <input type="number" id="rssInterval" value="${settings.default_rss_fetch_interval_minutes || '60'}" min="5" max="1440" style="width: 80px;">
                                <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c;" onclick="updateSetting('default_rss_fetch_interval_minutes', document.getElementById('rssInterval').value)">Update</button>
                            </div>
                            <p style="font-size: 0.85em; color: #7f8c8d; margin-top: 5px;">How often to automatically fetch new articles.</p>
                        </div>
                    </div>
                    <div class="settings-section" style="margin-top: 25px;">
                        <h3>Default Prompts</h3>
                        <div class="form-group">
                            <label>Summary Prompt</label>
                            <textarea id="summaryPrompt" rows="3">${(settings.summary_prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                            <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c; margin-top: 8px;" onclick="updateSetting('summary_prompt', document.getElementById('summaryPrompt').value)">Update</button>
                        </div>
                        <div class="form-group">
                            <label>Chat Prompt</label>
                            <textarea id="chatPrompt" rows="3">${(settings.chat_prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                            <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c; margin-top: 8px;" onclick="updateSetting('chat_prompt', document.getElementById('chatPrompt').value)">Update</button>
                        </div>
                        <div class="form-group">
                            <label>Tag Generation Prompt</label>
                            <textarea id="tagPrompt" rows="3">${(settings.tag_prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                            <button class="nav-button" style="background: #1abc9c; color: white; border-color: #1abc9c; margin-top: 8px;" onclick="updateSetting('tag_prompt', document.getElementById('tagPrompt').value)">Update</button>
                        </div>
                    </div>
                    <div class="settings-section" style="margin-top: 25px;">
                        <h3>Data Management</h3>
                        <div class="form-group">
                            <label for="days-old-input">Delete articles older than (days):</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="number" id="days-old-input" value="30" min="1" max="3650" style="width: 100px;">
                                <button class="nav-button" style="background: #e74c3c; border-color: #e74c3c; color: white;" onclick="deleteOldData()">Delete Old Articles</button>
                            </div>
                            <p id="delete-status" style="margin-top: 10px; font-size: 0.9em;"></p>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('settingsForm').innerHTML = 
                    `<p style="color: #e74c3c; padding: 20px;">Error loading settings: ${error.message}</p>`;
            }
        }

        window.updateSetting = async function(key, value) {
            try {
                await apiService.updateAdminSettings({ [key]: value });
                showAlert('Setting updated');
            } catch (error) {
                showAlert('Error updating setting: ' + error.message, 'error');
            }
        };

        window.deleteOldData = async function() {
            const days = parseInt(document.getElementById('days-old-input').value);
            const statusEl = document.getElementById('delete-status');
            if (isNaN(days) || days < 1) {
                statusEl.textContent = 'Please enter a valid number of days.';
                statusEl.style.color = '#e74c3c';
                return;
            }
            if (!confirm(`Delete all articles older than ${days} days? This cannot be undone.`)) return;
            statusEl.textContent = 'Deleting...';
            statusEl.style.color = 'inherit';
            try {
                const result = await apiService.deleteOldData(days);
                statusEl.textContent = result.message || 'Done';
                statusEl.style.color = '#27ae60';
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                statusEl.style.color = '#e74c3c';
            }
        };

        async function checkAuth() {
            const userData = localStorage.getItem('user_data');
            if (!userData) {
                window.location.href = '/';
                return;
            }
            const user = JSON.parse(userData);
            if (!user.is_admin) {
                document.getElementById('navUser').textContent = 'Not admin';
                showAlert('Admin access required', 'error');
                return;
            }
            document.getElementById('navUser').textContent = user.email;
            loadUsers();
        }

        checkAuth();

        document.getElementById('editFeedModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
